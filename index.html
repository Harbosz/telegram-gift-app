<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Constructor Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #222);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .glass { background: var(--tg-theme-bg-color, #fff); backdrop-filter: blur(10px); }
        .slot-card {
            aspect-ratio: 1/1;
            background: var(--tg-theme-bg-color, #fff);
            border: 2px dashed var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .slot-filled { border: none; }
        .nav-btn { color: var(--tg-theme-hint-color, #999); }
        .nav-btn.active { color: var(--tg-theme-button-color, #2481cc); }
        
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        /* Стили для селектов в стиле Телеграм */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="pb-24">
    <div id="app">
        <!-- HEADER -->
        <header class="glass p-4 sticky top-0 z-40 flex justify-between items-center border-b border-black/5">
            <div class="flex items-center gap-3">
                <img :src="user.photo_url || 'https://via.placeholder.com/40'" class="w-10 h-10 rounded-full border-2 border-blue-500">
                <div>
                    <h1 class="text-sm font-bold">{{ user.first_name || 'Collector' }}</h1>
                    <p class="text-[10px] opacity-60 uppercase tracking-tighter font-bold">Designer Mode</p>
                </div>
            </div>
            <div class="flex gap-4 text-lg">
                <i class="fa-solid fa-circle-half-stroke text-blue-500"></i>
            </div>
        </header>

        <!-- CONSTRUCTOR GRID -->
        <main v-if="activeTab === 'constructor'" class="p-4 animate-in fade-in duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg">Конструктор</h2>
                <div class="flex gap-2">
                    <button @click="removeRow" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-black uppercase tracking-widest active:scale-95 transition-all">Удалить</button>
                    <button @click="addRow" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black uppercase tracking-widest active:scale-95 transition-all">Добавить</button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div v-for="(slot, index) in slots" :key="index" 
                     @click="openPicker(index)"
                     class="slot-card"
                     :class="{'slot-filled': slot.model}"
                     :style="slot.backdrop ? { backgroundImage: `url(${slot.backdrop})` } : {}">
                    
                    <img v-if="slot.model" :src="slot.model.image_url" class="w-full h-full object-contain p-1 z-10">
                    <i v-else class="fa-solid fa-plus text-2xl opacity-20"></i>
                </div>
            </div>
        </main>

        <!-- COLLECTIONS TAB -->
        <main v-if="activeTab === 'collections'" class="p-4 text-center py-20">
            <i class="fa-solid fa-layer-group text-5xl opacity-10 mb-4"></i>
            <h2 class="font-black text-xl uppercase italic">Collections</h2>
            <p class="text-zinc-400 text-xs mt-2 uppercase tracking-widest">Under Construction</p>
        </main>

        <!-- PICKER PANEL (Bottom Sheet) -->
        <div class="fixed inset-0 bg-black/60 z-[60] transition-opacity" v-if="pickerOpen" @click="pickerOpen = false"></div>
        <div :class="['fixed bottom-0 left-0 right-0 glass rounded-t-[32px] z-[70] p-8 bottom-sheet max-h-[90vh] overflow-y-auto', pickerOpen ? 'open' : '']">
            <div class="w-12 h-1.5 bg-zinc-200 rounded-full mx-auto mb-8"></div>
            
            <h3 class="font-black text-xl mb-6 uppercase italic">Настройка слота</h3>

            <!-- ПРЕВЬЮ ВНУТРИ ПАНЕЛИ -->
            <div class="flex justify-center mb-8">
                <div class="w-32 h-32 slot-card slot-filled shadow-2xl" 
                     :style="tempSelection.backdrop ? { backgroundImage: `url(${tempSelection.backdrop})` } : {}">
                    <img v-if="tempSelection.model" :src="tempSelection.model.image_url" class="w-full h-full object-contain p-2">
                </div>
            </div>

            <div class="space-y-4">
                <!-- 1. ВЫБОР ПОДАРКА -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-1 mb-1 block">Подарок</label>
                    <select v-model="tempSelection.baseGift" @change="onGiftChange" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-sm">
                        <option value="" disabled>Выберите подарок</option>
                        <option v-for="name in uniqueGifts" :key="name" :value="name">{{ name }}</option>
                    </select>
                </div>

                <!-- 2. ВЫБОР МОДЕЛИ -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-1 mb-1 block">Модель</label>
                    <select v-model="tempSelection.model" :disabled="!tempSelection.baseGift" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-sm">
                        <option :value="null">{{ tempSelection.baseGift ? 'Выберите модель' : 'Сначала выберите подарок' }}</option>
                        <option v-for="m in filteredModels" :key="m.id" :value="m">{{ m.name.split(':')[1] }} ({{ m.rarity/10 }}%)</option>
                    </select>
                </div>

                <!-- 3. ВЫБОР ФОНА -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-1 mb-1 block">Фон</label>
                    <select v-model="tempSelection.backdrop" :disabled="!tempSelection.baseGift" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-sm">
                        <option :value="null">{{ tempSelection.baseGift ? 'Без фона' : 'Сначала выберите подарок' }}</option>
                        <option v-for="b in backdrops" :key="b" :value="b">{{ b.split('/').pop().split('.')[0] }}</option>
                    </select>
                </div>

                <!-- 4. ВЫБОР УЗОРА -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-1 mb-1 block">Узор</label>
                    <select disabled class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-sm">
                        <option>Сначала выберите подарок</option>
                    </select>
                </div>
            </div>

            <!-- КНОПКИ ДЕЙСТВИЯ -->
            <div class="flex gap-4 mt-10">
                <button @click="resetSlot" class="flex-1 py-4 bg-zinc-100 text-zinc-500 rounded-2xl font-black uppercase tracking-widest text-xs active:scale-95 transition-all">Сбросить</button>
                <button @click="saveSelection" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-blue-500/30 active:scale-95 transition-all">Закрыть</button>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="glass fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center border-t border-black/5 px-6 z-50">
            <div @click="activeTab = 'constructor'" :class="['nav-btn flex flex-col items-center gap-1', activeTab === 'constructor' ? 'active' : '']">
                <i class="fa-solid fa-square-plus text-xl"></i>
                <span class="text-[9px] font-black uppercase">Создать</span>
            </div>
            <div @click="activeTab = 'collections'" :class="['nav-btn flex flex-col items-center gap-1', activeTab === 'collections' ? 'active' : '']">
                <i class="fa-solid fa-layer-group text-xl"></i>
                <span class="text-[9px] font-black uppercase">Коллекции</span>
            </div>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const tg = window.Telegram.WebApp;

        createApp({
            setup() {
                const activeTab = ref('constructor');
                const user = ref(tg.initDataUnsafe?.user || { first_name: 'Collector', photo_url: '' });
                const gifts = ref([]);
                const slots = ref(Array(12).fill().map(() => ({ model: null, backdrop: null })));
                
                const pickerOpen = ref(false);
                const activeSlotIndex = ref(null);
                
                const tempSelection = ref({
                    baseGift: '',
                    model: null,
                    backdrop: null
                });

                const backdrops = ref([]);

                const loadData = async () => {
                    const res = await fetch('gifts.json');
                    gifts.value = await res.json();
                };

                const uniqueGifts = computed(() => {
                    return [...new Set(gifts.value.map(g => g.name.split(':')[0].trim()))];
                });

                const filteredModels = computed(() => {
                    if (!tempSelection.value.baseGift) return [];
                    return gifts.value.filter(g => g.name.startsWith(tempSelection.value.baseGift));
                });

                const openPicker = (index) => {
                    activeSlotIndex.value = index;
                    const current = slots.value[index];
                    tempSelection.value = {
                        baseGift: current.model ? current.model.name.split(':')[0].trim() : '',
                        model: current.model,
                        backdrop: current.backdrop
                    };
                    if (tempSelection.value.baseGift) fetchBackdrops(tempSelection.value.baseGift);
                    pickerOpen.value = true;
                };

                const onGiftChange = () => {
                    tempSelection.value.model = null;
                    tempSelection.value.backdrop = null;
                    fetchBackdrops(tempSelection.value.baseGift);
                };

                const fetchBackdrops = async (giftName) => {
                    try {
                        const res = await fetch(`https://api.changes.tg/backdrops/${encodeURIComponent(giftName)}`);
                        if (res.ok) {
                            const names = await res.json();
                            backdrops.value = names.map(n => `https://api.changes.tg/backdrop/${encodeURIComponent(giftName)}/${encodeURIComponent(n)}.png`);
                        }
                    } catch (e) { console.error("Backdrops fetch error", e); }
                };

                const saveSelection = () => {
                    slots.value[activeSlotIndex.value] = { ...tempSelection.value };
                    pickerOpen.value = false;
                };

                const resetSlot = () => {
                    tempSelection.value = { baseGift: '', model: null, backdrop: null };
                };

                const addRow = () => { slots.value.push(...Array(3).fill().map(() => ({ model: null, backdrop: null }))); };
                const removeRow = () => { if (slots.value.length > 3) slots.value.splice(-3); };

                onMounted(() => { loadData(); tg.ready(); tg.expand(); });

                return { 
                    activeTab, user, slots, addRow, removeRow, pickerOpen, 
                    tempSelection, uniqueGifts, filteredModels, backdrops,
                    openPicker, onGiftChange, saveSelection, resetSlot
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
