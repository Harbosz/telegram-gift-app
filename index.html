<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gift Collections</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #222);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .glass-header {
            background: var(--tg-theme-bg-color, #fff);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="p-4 pt-0">
    <div id="app">
        <div class="glass-header py-4 mb-4">
            <h1 class="text-xl font-bold mb-4">💎 Gift Explorer</h1>
            <input 
                type="text" 
                v-model="query" 
                @input="search"
                placeholder="Поиск: золото, зеленый, эльф..." 
                class="w-full p-3 rounded-xl border-none ring-2 ring-blue-500/10 focus:ring-blue-500 bg-zinc-100 dark:bg-zinc-800 outline-none"
            >
            <p class="text-[10px] mt-2 text-zinc-400">Всего моделей в базе: {{ allGifts.length }}</p>
        </div>

        <div v-if="loading" class="flex justify-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
        </div>

        <div v-else class="grid grid-cols-2 gap-4">
            <div v-for="gift in displayedGifts" :key="gift.id" class="card overflow-hidden flex flex-col">
                <div class="relative pt-[100%] bg-zinc-50 dark:bg-zinc-900">
                    <img :src="gift.image_url" class="absolute inset-0 w-full h-full object-contain p-2" loading="lazy">
                </div>
                <div class="p-3">
                    <h3 class="font-bold text-[10px] leading-tight h-8 overflow-hidden">{{ gift.name }}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[9px] px-1.5 py-0.5 bg-blue-100 text-blue-600 rounded">{{ gift.rarity/10 }}%</span>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="!loading && displayedGifts.length === 0" class="text-center py-20 text-zinc-400">
            Ничего не нашли 😕
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const tg = window.Telegram.WebApp;

        createApp({
            setup() {
                const query = ref('');
                const allGifts = ref([]);
                const displayedGifts = ref([]);
                const loading = ref(true);
                let fuse = null;

                const loadData = async () => {
                    try {
                        // Загружаем JSON файл напрямую
                        const res = await fetch('gifts.json');
                        allGifts.value = await res.json();
                        
                        // Инициализируем поиск Fuse.js
                        fuse = new Fuse(allGifts.value, {
                            keys: ['name', 'description'],
                            threshold: 0.3, // Чувствительность поиска
                        });

                        displayedGifts.value = allGifts.value.slice(0, 30); // Показываем первые 30
                    } catch (e) {
                        console.error("Ошибка загрузки данных", e);
                    } finally {
                        loading.value = false;
                    }
                };

                const search = () => {
                    if (!query.value) {
                        displayedGifts.value = allGifts.value.slice(0, 30);
                        return;
                    }
                    const results = fuse.search(query.value);
                    displayedGifts.value = results.map(r => r.item).slice(0, 40);
                };

                onMounted(() => {
                    loadData();
                    tg.ready();
                    tg.expand();
                });

                return { query, allGifts, displayedGifts, loading, search };
            }
        }).mount('#app');
    </script>
</body>
</html>
